<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Super Videotome</title>
  <link rel="stylesheet" href="stylesheet.css">
  <script src="config.js"></script>
  <script src="code.js"></script>
  <script src="tags.js"></script>
  <script src="assets.js"></script>
  <script src="utils.js"></script>
</head>

<body onload="readyStory()">
  <noscript>You need to enable JavaScript to view the full site.</noscript>
  <div id="loading-screen">
    <div id="loading-progress"></div>
    <br>
  </div>

  <div id="main">
    <div id="menu-bar">
      <div class="menu-bar-bg">
        <span>
          <div id="autoplay">auto</div>
          <div id="historybutton">history</div>
          <div id="settingsbutton">settings</div>
        </span>

        <span>
          <div id="savebutton">saves</div>
          <div id="resetbutton">reset</div>
        </span>
      </div>
    </div>

    <div id="settings-menu" class="hidden"> Music volume
      <input type="range" min="0" max="1" step="0.1" id="settingsMusicVolume">
      SFX volume
      <input type="range" min="0" max="1" step="0.1" id="settingsSFXVolume">
      Autoplay speed
      <input type="range" min="40" max="120" step="10" id="settingsAutoplaySpeed">
    </div>

    <div id="save-menu" class="hidden">
      <div id="savegame">save game</div>
      <br>
      <div id="loadgame">load game</div>
    </div>

    <div class="screen crt" id="screen">
      <div id="messagecontainer" class="hidden">
        <ul id="messagelog"></ul>
      </div>

      <canvas id="text">text layer</canvas>
      <canvas id="front">front layer</canvas>
      <canvas hidden="hidden" id="front2">front layer 2</canvas>
      <canvas id="back">back layer</canvas>

      <div id="sidebar">
        <div class="hidden" id="statuswindow"></div>
        <br>
        <div class="hidden" id="choicewindow">
          <ol id="choicelist" class="choicelist"></ol>
        </div>
      </div>
    </div>

  </div>

<svg width="0" height="0" style="position:absolute;z-index:-1;">
  <defs><filter id="remove-alpha" x="0" y="0" width="100%" height="100%"><feComponentTransfer><feFuncA type="discrete" tableValues="0 1"></feFuncA></feComponentTransfer></filter></defs>
</svg>
<script>
  if (window.location.protocol.startsWith('file')) {
    document.body.innerHTML = `Videotome must run on a local server or be uploaded to a website to function. Check README.txt for more information.`
  }
</script>
</body>



</html>
